<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sovereign Vault</title>
    <style>
        :root {
            --ios-bg: #000000;
            --ios-dark-gray: #1C1C1E;
            --ios-border-light: rgba(255, 255, 255, 0.06);
            --ios-hint: rgba(255, 255, 255, 0.45);
            --glass-bg: rgba(28, 28, 30, 0.65);
            --glass-border: 1px solid rgba(255, 255, 255, 0.12);
            --glass-shine: inset 0 1px 1.5px rgba(255, 255, 255, 0.2);
            --glass-shadow: 0 24px 48px rgba(0, 0, 0, 0.6), 0 8px 16px rgba(0, 0, 0, 0.4);
            --ios-blue: #0A84FF;
        }

        * {
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body, html {
            background-color: var(--ios-bg);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
            color: white;
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100%;
            overflow: hidden;
            position: fixed; 
            -webkit-font-smoothing: antialiased;
            touch-action: none;
        }


        .app-viewport {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .center-wrapper {
            width: 100%;
            max-width: 320px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 0 16px;
            position: relative;
        }

        .safe-area-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin-bottom: 28px;
            z-index: 10;
        }

        .safe-image {
            width: 120px;
            height: 120px;
            object-fit: contain;
            display: block;
            filter: drop-shadow(0 8px 24px rgba(0, 0, 0, 0.5));
            transition: transform 0.2s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.25s ease;
            position: absolute;
            top: 0;
            left: 0;
            cursor: pointer;
        }

        .safe-image:active {
            transform: scale(0.92);
        }

        .safe-image.hidden {
            opacity: 0;
            transform: scale(0.8);
            pointer-events: none;
        }


        .folder-item {
            position: absolute;
            width: 56px;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease;
            z-index: -1;
            cursor: grab;
            will-change: transform;
        }

        .folder-item:active {
            cursor: grabbing;
        }

        .folder-item img {
            width: 50px;
            height: auto;
            object-fit: contain;
            pointer-events: none;
            transition: transform 0.15s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .folder-badge {
            background-color: var(--glass-bg);
            border: var(--glass-border);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: var(--glass-shine);
            padding: 3px 8px;
            border-radius: 999px;
            font-size: 10px;
            font-weight: 500;
            color: white;
            white-space: nowrap;
            margin-top: 4px;
            pointer-events: none;
        }

        .app-viewport.opened .folder-item {
            opacity: 1;
            pointer-events: auto;
            z-index: 15;
        }
        
        .app-viewport.opened .folder-item.f-left { transform: translate(-95px, -45px); }
        .app-viewport.opened .folder-item.f-center { transform: translate(32px, -85px); }
        .app-viewport.opened .folder-item.f-right { transform: translate(160px, -45px); }

        .title-frame {
            height: 34px;
            overflow: hidden;
            position: relative;
            width: 100%;
            margin-bottom: 12px;
        }

        .title {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin: 0;
            color: white;
            position: absolute;
            width: 100%;
            left: 0;
            top: 0;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s ease;
        }

        .title.incoming {
            transform: translateY(-100%);
            opacity: 0;
        }

        .description {
            font-size: 14px;
            font-weight: 400;
            line-height: 1.45;
            color: var(--ios-hint);
            margin: 0 0 36px 0;
            transition: opacity 0.25s ease;
        }


        .controls-row {
            width: 100%;
            display: flex;
            position: relative;
        }

        .input-container {
            flex: 1;
            position: relative;
        }

        .ios-input {
            width: 100%;
            height: 52px;
            background-color: var(--ios-dark-gray);
            border: 1px solid var(--ios-border-light);
            border-radius: 999px;
            color: white;
            font-size: 17px;
            font-weight: 400;
            text-align: center;
            outline: none;
            -webkit-appearance: none;
            -webkit-user-select: text;
            user-select: text;
        }

        .ios-input::placeholder {
            color: var(--ios-hint);
            opacity: 0.6;
            text-align: center;
        }

        .ios-input:focus {
            animation: tap-jelly-fast 0.25s cubic-bezier(0.25, 1.3, 0.4, 1.4) forwards;
        }

        .login-btn {
            width: 0;
            height: 52px;
            background-color: var(--ios-dark-gray);
            border: 1px solid var(--ios-border-light);
            border-radius: 999px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            opacity: 0;
            cursor: pointer;
            pointer-events: none;
            transition: width 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.25s ease, margin-left 0.35s ease;
        }

        .login-btn img {
            width: 22px;
            height: 22px;
            object-fit: contain;
            display: block;
        }

        .controls-row.valid .login-btn {
            width: 52px;
            opacity: 1;
            margin-left: 10px;
            pointer-events: auto;
            animation: button-bounce 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .counters-grid {
            width: 100%;
            display: none;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            animation: fade-in-up 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .counter-pill {
            height: 52px;
            background-color: var(--ios-dark-gray);
            border: 1px solid var(--ios-border-light);
            border-radius: 999px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .counter-val {
            font-size: 16px;
            font-weight: 700;
            line-height: 1.1;
        }

        .counter-label {
            font-size: 10px;
            font-weight: 500;
            color: var(--ios-hint);
            margin-top: 1px;
        }


        .folder-tab {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000000;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform: translateY(100%);
            transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1);
        }

        .folder-tab.active {
            transform: translateY(0);
        }

        .tab-header-area {
            position: absolute;
            top: 15px;
            left: 0;
            width: 100%;
            padding: 0 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 44px;
            z-index: 110;
        }

        .glass-drop {
            position: absolute;
            width: 44px;
            height: 44px;
            background: var(--glass-bg);
            backdrop-filter: blur(50px) saturate(200%);
            -webkit-backdrop-filter: blur(50px) saturate(200%);
            border: var(--glass-border);
            box-shadow: var(--glass-shine), 0 8px 16px rgba(0,0,0,0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.32, 0.72, 0, 1);
        }

        .glass-drop:active {
            transform: scale(0.9);
        }
        
        .glass-drop.left { left: 16px; }
        .glass-drop.right { right: 16px; display: none; }

        .glass-drop svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: #ffffff;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .tab-title {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.3px;
            color: #fff;
        }

        .glass-capsule-btn {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            height: 52px;
            background: var(--glass-bg);
            backdrop-filter: blur(50px) saturate(200%);
            -webkit-backdrop-filter: blur(50px) saturate(200%);
            border: var(--glass-border);
            box-shadow: var(--glass-shine), var(--glass-shadow);
            border-radius: 999px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 28px;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.32, 0.72, 0, 1);
            z-index: 110;
        }

        .glass-capsule-btn:active {
            transform: translateX(-50%) scale(0.95);
        }

        .glass-capsule-btn svg {
            width: 20px;
            height: 20px;
            margin-right: 8px;
            fill: none;
            stroke: #ffffff;
            stroke-width: 2.5;
            stroke-linecap: round;
        }

        .glass-capsule-btn span {
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
        }

        .content-grid {
            width: 100%;
            height: 100%;
            padding: 80px 16px 80px 16px;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 16px;
            align-content: flex-start;
        }

        .inner-folder {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }

        .inner-folder img {
            width: 60px;
            height: 60px;
            object-fit: contain;
            margin-bottom: 6px;
        }

        .inner-folder span {
            background-color: var(--glass-bg);
            border: var(--glass-border);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 3px 8px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 500;
            color: white;
            text-align: center;
            width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
        }


        .custom-alert-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .custom-alert-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .custom-alert-box {
            width: 290px;
            background: rgba(30, 30, 32, 0.75);
            backdrop-filter: blur(50px) saturate(200%);
            -webkit-backdrop-filter: blur(50px) saturate(200%);
            border: var(--glass-border);
            box-shadow: var(--glass-shine), var(--glass-shadow);
            border-radius: 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 20px 20px;
            transform: scale(0.9);
            transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
        }

        .custom-alert-overlay.active .custom-alert-box {
            transform: scale(1);
        }

        .custom-alert-title {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 6px;
            text-align: center;
        }

        .custom-alert-desc {
            font-size: 13px;
            font-weight: 400;
            color: var(--ios-hint);
            text-align: center;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .custom-alert-actions {
            width: 100%;
            display: flex;
            gap: 10px;
        }

        .alert-btn {
            flex: 1;
            height: 44px;
            border-radius: 999px;
            border: none;
            font-size: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .alert-btn.secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .alert-btn.primary {
            background: var(--ios-blue);
            color: white;
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.3);
        }

        .viewer-overlay {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 500;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            display: flex;
            flex-direction: column;
        }
        
        .viewer-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .viewer-header {
            position: absolute;
            top: 15px;
            left: 0;
            width: 100%;
            height: 44px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            z-index: 510;
        }

        .photo-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            touch-action: none;
        }

        .photo-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: transform 0.1s linear;
        }

        .text-sheet {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 90vh;
            background: rgba(28, 28, 30, 0.95);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-top-left-radius: 32px;
            border-top-right-radius: 32px;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.15);
            border-top: var(--glass-border);
            transform: translateY(100%);
            transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1);
            display: flex;
            flex-direction: column;
        }

        .viewer-overlay.active .text-sheet {
            transform: translateY(0);
        }

        .sheet-handle {
            width: 36px;
            height: 5px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 999px;
            margin: 12px auto;
        }

        .sheet-content {
            flex: 1;
            padding: 0 24px 40px;
            overflow-y: auto;
            font-size: 17px;
            line-height: 1.6;
            color: white;
            white-space: pre-wrap;
        }

        @keyframes tap-jelly-fast {
            0% { transform: scale(1); }
            45% { transform: scaleX(1.04) scaleY(0.96); }
            100% { transform: scale(1); }
        }

        @keyframes button-bounce {
            0% { transform: scale(0.65); }
            70% { transform: scale(1.06); }
            100% { transform: scale(1); }
        }

        @keyframes fade-in-up {
            0% { opacity: 0; transform: translateY(10px) scale(0.98); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
    </style>
</head>
<body>


    <div class="app-viewport" id="viewport" onclick="closeFolders(event)">
        <div class="center-wrapper" onclick="event.stopPropagation()">
            
            <div class="safe-area-container">
                <div class="folder-item f-left" onclick="openTab('Тексты')">
                    <img src="folder.png" onerror="this.outerHTML='<svg viewBox=\'0 0 100 100\'><path d=\'M10 80C10 85.5 14.5 90 20 90H80C85.5 90 90 85.5 90 80V40H10V80ZM45 10H20C14.5 10 10 14.5 10 20V30H90V25C90 19.5 85.5 15 80 15H55L45 10Z\' fill=\'#0A84FF\'/></svg>'">
                    <div class="folder-badge">Тексты</div>
                </div>
                <div class="folder-item f-center" onclick="openTab('Фото')">
                    <img src="folder.png" onerror="this.outerHTML='<svg viewBox=\'0 0 100 100\'><path d=\'M10 80C10 85.5 14.5 90 20 90H80C85.5 90 90 85.5 90 80V40H10V80ZM45 10H20C14.5 10 10 14.5 10 20V30H90V25C90 19.5 85.5 15 80 15H55L45 10Z\' fill=\'#0A84FF\'/></svg>'">
                    <div class="folder-badge">Фото</div>
                </div>
                <div class="folder-item f-right" onclick="openTab('Прочее')">
                    <img src="folder.png" onerror="this.outerHTML='<svg viewBox=\'0 0 100 100\'><path d=\'M10 80C10 85.5 14.5 90 20 90H80C85.5 90 90 85.5 90 80V40H10V80ZM45 10H20C14.5 10 10 14.5 10 20V30H90V25C90 19.5 85.5 15 80 15H55L45 10Z\' fill=\'#0A84FF\'/></svg>'">
                    <div class="folder-badge">Прочее</div>
                </div>

                <img src="safe.png" class="safe-image" id="safeClosed" onclick="handleSafeClick()" onerror="this.outerHTML='<svg class=\'safe-image\' id=\'safeClosed\' onclick=\'handleSafeClick()\' viewBox=\'0 0 100 100\'><rect x=\'10\' y=\'10\' width=\'80\' height=\'80\' rx=\'20\' fill=\'#1C1C1E\' stroke=\'#333\' stroke-width=\'4\'/><circle cx=\'50\' cy=\'50\' r=\'20\' fill=\'none\' stroke=\'#888\' stroke-width=\'6\'/><circle cx=\'50\' cy=\'50\' r=\'6\' fill=\'#888\'/></svg>'">
                <img src="safe2.png" class="safe-image hidden" id="safeOpened" onclick="handleSafeClick()" onerror="this.outerHTML='<svg class=\'safe-image hidden\' id=\'safeOpened\' onclick=\'handleSafeClick()\' viewBox=\'0 0 100 100\'><rect x=\'10\' y=\'10\' width=\'80\' height=\'80\' rx=\'20\' fill=\'#1C1C1E\' stroke=\'#333\' stroke-width=\'4\'/><path d=\'M50 30 V70 M30 50 H70\' stroke=\'#0A84FF\' stroke-width=\'8\' stroke-linecap=\'round\'/></svg>'">
            </div>
            
            <div class="title-frame">
                <h1 class="title" id="mainTitle">Добро пожаловать!</h1>
            </div>
            
            <p class="description" id="mainDesc">Придумай надежные пароль, который содержит минимум 8 символов, заглавную букву и цифру</p>
            
            <div class="controls-row" id="controlsRow">
                <div class="input-container">
                    <input type="password" class="ios-input" id="passInput" placeholder="ABC123" autocomplete="off" oninput="validatePassword(this)">
                </div>
                <div class="login-btn" id="loginBtn" onclick="initiateLogin()">
                    <img src="login.png" onerror="this.outerHTML='<svg viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'#fff\' stroke-width=\'2.5\' stroke-linecap=\'round\' stroke-linejoin=\'round\' style=\'width:20px;height:20px;\'><path d=\'M5 12h14M12 5l7 7-7 7\'/></svg>'">
                </div>
            </div>

            <div class="counters-grid" id="countersGrid">
                <div class="counter-pill">
                    <div class="counter-val">0</div>
                    <div class="counter-label">Текстов</div>
                </div>
                <div class="counter-pill">
                    <div class="counter-val">0</div>
                    <div class="counter-label">Фото</div>
                </div>
                <div class="counter-pill">
                    <div class="counter-val">0</div>
                    <div class="counter-label">Прочего</div>
                </div>
            </div>

        </div>
    </div>


    <div class="folder-tab" id="folderTab">
        <div class="tab-header-area">
            <div class="glass-drop left" onclick="closeActiveTab()">
                <svg viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7" /></svg>
            </div>
            <div class="tab-title" id="tabTitle">Раздел</div>
            <div class="glass-drop right" id="createInnerFolderBtn" onclick="createInnerFolder()">
                <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" /></svg>
            </div>
        </div>
        
        <div class="content-grid" id="contentGrid"></div>

        <div class="glass-capsule-btn" onclick="triggerAddAction()">
            <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" /></svg>
            <span>Добавить</span>
        </div>
    </div>


    <div class="custom-alert-overlay" id="iosAlertOverlay">
        <div class="custom-alert-box">
            <div class="custom-alert-title" id="iosAlertTitle">Уведомление</div>
            <div class="custom-alert-desc" id="iosAlertDesc">Текст</div>
            <div class="custom-alert-actions" id="iosAlertActions"></div>
        </div>
    </div>

    <div class="viewer-overlay" id="photoViewer">
        <div class="viewer-header">
            <div class="glass-drop left" onclick="closePhotoViewer()">
                <svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12" /></svg>
            </div>
        </div>
        <div class="photo-container" id="photoContainer">
            <img id="viewerImage" src="" alt="">
        </div>
    </div>

    <div class="viewer-overlay" id="textViewer">
        <div class="viewer-header">
            <div class="glass-drop left" onclick="closeTextViewer()">
                <svg viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7" /></svg>
            </div>
        </div>
        <div class="text-sheet">
            <div class="sheet-handle"></div>
            <div class="sheet-content" id="viewerText"></div>
        </div>
    </div>


    <script>
        let isWorkspaceUnlocked = false;
        let currentTabType = '';
        let hasVisited = localStorage.getItem('sv_visited');

        window.onload = () => {
            if (hasVisited) {
                document.getElementById('mainTitle').innerText = 'Вход';
                document.getElementById('mainDesc').innerText = 'Введите ваш пароль для доступа к воркспейсу.';
            }
        };

        function customAlert(title, desc, showCancel = true) {
            return new Promise(resolve => {
                const overlay = document.getElementById('iosAlertOverlay');
                document.getElementById('iosAlertTitle').innerText = title;
                document.getElementById('iosAlertDesc').innerText = desc;
                
                const actions = document.getElementById('iosAlertActions');
                actions.innerHTML = '';

                if (showCancel) {
                    const cancelBtn = document.createElement('button');
                    cancelBtn.className = 'alert-btn secondary';
                    cancelBtn.innerText = 'Отмена';
                    cancelBtn.onclick = () => { overlay.classList.remove('active'); resolve(false); };
                    actions.appendChild(cancelBtn);
                }

                const primaryBtn = document.createElement('button');
                primaryBtn.className = 'alert-btn primary';
                primaryBtn.innerText = 'Продолжить';
                primaryBtn.onclick = () => { overlay.classList.remove('active'); resolve(true); };
                actions.appendChild(primaryBtn);

                overlay.classList.add('active');
            });
        }

        async function promptFolderCreation() {
            return new Promise(resolve => {
                const overlay = document.getElementById('iosAlertOverlay');
                document.getElementById('iosAlertTitle').innerText = 'Новая папка';
                document.getElementById('iosAlertDesc').innerHTML = '<input type="text" id="folderNameInput" class="ios-input" style="height:40px; margin-top:10px; font-size:15px;" placeholder="Название">';
                
                const actions = document.getElementById('iosAlertActions');
                actions.innerHTML = '';

                const cancelBtn = document.createElement('button');
                cancelBtn.className = 'alert-btn secondary';
                cancelBtn.innerText = 'Отмена';
                cancelBtn.onclick = () => { overlay.classList.remove('active'); resolve(null); };
                actions.appendChild(cancelBtn);

                const primaryBtn = document.createElement('button');
                primaryBtn.className = 'alert-btn primary';
                primaryBtn.innerText = 'Создать';
                primaryBtn.onclick = () => { 
                    const name = document.getElementById('folderNameInput').value;
                    overlay.classList.remove('active'); 
                    resolve(name); 
                };
                actions.appendChild(primaryBtn);

                overlay.classList.add('active');
                setTimeout(() => document.getElementById('folderNameInput').focus(), 100);
            });
        }

        function validatePassword(input) {
            const val = input.value;
            const hasMinLength = val.length >= 8;
            const hasUpper = /[A-Z]/.test(val) || /[А-Я]/.test(val);
            const hasNumber = /[0-9]/.test(val);
            
            const row = document.getElementById('controlsRow');
            if (hasMinLength && hasUpper && hasNumber) {
                row.classList.add('valid');
            } else {
                row.classList.remove('valid');
            }
        }

        async function initiateLogin() {
            if (!hasVisited) {
                const proceed = await customAlert("Условия", "Продолжая, вы принимаете наши условия использования.");
                if (proceed) {
                    localStorage.setItem('sv_visited', 'true');
                    executeTransition();
                }
            } else {
                executeTransition();
            }
        }

        function executeTransition() {
            const title = document.getElementById('mainTitle');
            const desc = document.getElementById('mainDesc');
            const controls = document.getElementById('controlsRow');
            const counters = document.getElementById('countersGrid');
            const frame = title.parentElement;

            title.style.transform = 'translateY(100%)';
            title.style.opacity = '0';
            desc.style.opacity = '0';

            controls.style.opacity = '0';
            controls.style.transform = 'scale(0.95)';
            controls.style.pointerEvents = 'none';

            setTimeout(() => {
                const newTitle = document.createElement('h1');
                newTitle.className = 'title incoming';
                newTitle.id = 'mainTitle';
                newTitle.innerText = 'Воркспейс';
                frame.appendChild(newTitle);

                setTimeout(() => {
                    newTitle.style.transform = 'translateY(0)';
                    newTitle.style.opacity = '1';
                }, 50);

                desc.innerText = 'Храните здесь тексты, фотографии и видео анонимно';
                desc.style.opacity = '1';

                controls.remove();
                counters.style.display = 'grid';
                isWorkspaceUnlocked = true;
            }, 300);
        }

        function handleSafeClick() {
            if (!isWorkspaceUnlocked) return;
            const viewport = document.getElementById('viewport');
            const closedSafe = document.getElementById('safeClosed');
            const openedSafe = document.getElementById('safeOpened');

            if (!viewport.classList.contains('opened')) {
                closedSafe.classList.add('hidden');
                openedSafe.classList.remove('hidden');
                viewport.classList.add('opened');
            } else {
                viewport.classList.remove('opened');
                openedSafe.classList.add('hidden');
                closedSafe.classList.remove('hidden');
            }
        }

        function closeFolders(event) {
            const viewport = document.getElementById('viewport');
            if (viewport.classList.contains('opened')) {
                viewport.classList.remove('opened');
                document.getElementById('safeOpened').classList.add('hidden');
                document.getElementById('safeClosed').classList.remove('hidden');
            }
        }


        function openTab(type) {
            currentTabType = type;
            document.getElementById('tabTitle').innerText = type;
            const tab = document.getElementById('folderTab');
            const rightDrop = document.getElementById('createInnerFolderBtn');
            
            if (type === 'Прочее') {
                rightDrop.style.display = 'flex';
            } else {
                rightDrop.style.display = 'none';
            }

            document.getElementById('contentGrid').innerHTML = '';
            tab.classList.add('active');
        }

        function closeActiveTab() {
            const tab = document.getElementById('folderTab');
            tab.classList.remove('active');
        }

        async function createInnerFolder() {
            const name = await promptFolderCreation();
            if (name && name.trim() !== '') {
                const grid = document.getElementById('contentGrid');
                const div = document.createElement('div');
                div.className = 'inner-folder';
                div.innerHTML = `<img src="folder.png" onerror="this.outerHTML='<svg viewBox=\\\'0 0 100 100\\\'><path d=\\\'M10 80C10 85.5 14.5 90 20 90H80C85.5 90 90 85.5 90 80V40H10V80ZM45 10H20C14.5 10 10 14.5 10 20V30H90V25C90 19.5 85.5 15 80 15H55L45 10Z\\\' fill=\\\'#0A84FF\\\'/></svg>'"><span>${name}</span>`;
                div.onclick = () => openTab(name);
                grid.appendChild(div);
            }
        }

        function triggerAddAction() {
            const input = document.createElement('input');
            input.type = 'file';
            input.style.display = 'none';
            
            input.onchange = e => {
                const file = e.target.files[0];
                if (!file) return;
                
                const grid = document.getElementById('contentGrid');
                const div = document.createElement('div');
                div.className = 'inner-folder';
                
                if (file.type.startsWith('image/')) {
                    const url = URL.createObjectURL(file);
                    div.innerHTML = `<img style="border-radius:12px; object-fit:cover;" src="${url}"><span>${file.name}</span>`;
                    div.onclick = () => openPhotoViewer(url);
                } else if (file.type.startsWith('text/')) {
                    const reader = new FileReader();
                    reader.onload = (re) => {
                        div.innerHTML = `<img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2'><rect x='4' y='2' width='16' height='20' rx='2' ry='2'/><line x1='8' y1='6' x2='16' y2='6'/><line x1='8' y1='10' x2='16' y2='10'/><line x1='8' y1='14' x2='12' y2='14'/></svg>"><span>${file.name}</span>`;
                        div.onclick = () => openTextViewer(re.target.result);
                    };
                    reader.readAsText(file);
                } else {
                    div.innerHTML = `<img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2'><circle cx='12' cy='12' r='10'/></svg>"><span>${file.name}</span>`;
                }
                
                grid.appendChild(div);
            };
            
            document.body.appendChild(input);
            input.click();
            document.body.removeChild(input);
        }


        function openPhotoViewer(url) {
            document.getElementById('viewerImage').src = url;
            document.getElementById('photoViewer').classList.add('active');
            resetZoom();
        }

        function closePhotoViewer() {
            document.getElementById('photoViewer').classList.remove('active');
            setTimeout(() => document.getElementById('viewerImage').src = '', 400);
        }

        function openTextViewer(text) {
            document.getElementById('viewerText').innerText = text;
            document.getElementById('textViewer').classList.add('active');
        }

        function closeTextViewer() {
            document.getElementById('textViewer').classList.remove('active');
        }

        let currentZoom = 1;
        let pX = 0, pY = 0;
        
        function resetZoom() {
            currentZoom = 1;
            pX = 0; pY = 0;
            const img = document.getElementById('viewerImage');
            img.style.transform = `translate(0px, 0px) scale(1)`;
        }

        const photoContainer = document.getElementById('photoContainer');
        photoContainer.addEventListener('wheel', e => {
            if(!document.getElementById('photoViewer').classList.contains('active')) return;
            e.preventDefault();
            currentZoom += e.deltaY * -0.01;
            currentZoom = Math.min(Math.max(1, currentZoom), 5);
            const img = document.getElementById('viewerImage');
            img.style.transform = `translate(${pX}px, ${pY}px) scale(${currentZoom})`;
        }, {passive: false});

        document.querySelectorAll('.folder-item').forEach(folder => {
            let isDragging = false, startX, startY;
            const img = folder.querySelector('img');

            folder.addEventListener('touchstart', e => {
                if (!document.getElementById('viewport').classList.contains('opened')) return;
                isDragging = true;
                startX = e.touches[0].clientX;
                startY = e.touches[0].clientY;
            }, { passive: true });

            folder.addEventListener('touchmove', e => {
                if (!isDragging) return;
                let deltaX = e.touches[0].clientX - startX;
                let deltaY = e.touches[0].clientY - startY;
                const maxDist = 18;
                const dist = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
                if (dist > maxDist) {
                    deltaX = (deltaX / dist) * maxDist;
                    deltaY = (deltaY / dist) * maxDist;
                }
                folder.style.zIndex = '100';
                img.style.transform = `translate(${deltaX}px, ${deltaY}px) skewX(${deltaX * 0.4}deg) scaleX(${1 + Math.abs(deltaX) * 0.003})`;
            }, { passive: false });

            folder.addEventListener('touchend', () => {
                if (!isDragging) return;
                isDragging = false;
                folder.style.zIndex = '15';
                img.style.transition = 'transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                img.style.transform = 'translate(0, 0) skewX(0deg) scaleX(1)';
                setTimeout(() => { img.style.transition = 'transform 0.15s cubic-bezier(0.2, 0.8, 0.2, 1)'; }, 300);
            });
        });

    </script>
</body>
</html>

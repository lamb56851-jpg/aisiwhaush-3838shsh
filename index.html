<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sovereign Vault</title>
    <style>
        :root {
            --ios-bg: #000000;
            --ios-dark-gray: #1C1C1E;
            --ios-border-light: rgba(255, 255, 255, 0.06);
            --ios-hint: rgba(255, 255, 255, 0.45);
        }

        body, html {
            background-color: var(--ios-bg);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
            color: white;
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100%;
            overflow: hidden;
            position: fixed; 
            -webkit-font-smoothing: antialiased;
            touch-action: manipulation;
            box-sizing: border-box;
        }

        .app-viewport {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .center-wrapper {
            width: 100%;
            max-width: 320px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 0 16px;
            box-sizing: border-box;
            position: relative;
        }

        /* Контейнер сейфа с поддержкой вылетающих папок */
        .safe-area-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin-bottom: 28px;
            z-index: 10;
        }

        .safe-image {
            width: 120px;
            height: 120px;
            object-fit: contain;
            display: block;
            filter: drop-shadow(0 8px 24px rgba(0, 0, 0, 0.5));
            transition: transform 0.25s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.25s ease;
            position: absolute;
            top: 0;
            left: 0;
            cursor: pointer;
        }

        /* Эффект легкого быстрого сжатия сейфа при клике */
        .safe-image:active {
            transform: scale(0.92);
        }

        .safe-image.hidden {
            opacity: 0;
            transform: scale(0.8);
            pointer-events: none;
        }

        /* Внутренние папки (Файлы) */
        .folder-item {
            position: absolute;
            width: 56px;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            /* Вылет сверху с замедлением под конец */
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s ease;
            z-index: -1;
            cursor: grab;
            user-select: none;
            will-change: transform;
        }

        .folder-item:active {
            cursor: grabbing;
        }

        .folder-item img {
            width: 50px;
            height: auto;
            object-fit: contain;
            pointer-events: none;
            transition: transform 0.1s linear;
        }

        /* Названия папок в плавающих капсулах */
        .folder-badge {
            background-color: rgba(28, 28, 30, 0.85);
            border: 1px solid var(--ios-border-light);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 3px 8px;
            border-radius: 999px;
            font-size: 10px;
            font-weight: 500;
            color: white;
            white-space: nowrap;
            margin-top: 4px;
            pointer-events: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }

        /* Координаты разлета папок во включенном состоянии сейфа */
        .app-viewport.opened .folder-item {
            opacity: 1;
            pointer-events: auto;
            z-index: 15;
        }
        /* Левая папка */
        .app-viewport.opened .folder-item.f-left {
            transform: translate(-95px, -45px);
        }
        /* Центральная (Верхняя) папка */
        .app-viewport.opened .folder-item.f-center {
            transform: translate(32px, -85px);
        }
        /* Правая папка */
        .app-viewport.opened .folder-item.f-right {
            transform: translate(160px, -45px);
        }

        /* Обычный сдвиг заголовка */
        .title-frame {
            height: 34px;
            overflow: hidden;
            position: relative;
            width: 100%;
            margin-bottom: 12px;
        }

        .title {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin: 0;
            color: white;
            position: absolute;
            width: 100%;
            left: 0;
            top: 0;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s ease;
        }

        .title.incoming {
            transform: translateY(-100%);
            opacity: 0;
        }

        .description {
            font-size: 14px;
            font-weight: 400;
            line-height: 1.45;
            color: var(--ios-hint);
            margin: 0 0 36px 0;
            transition: opacity 0.25s ease;
        }

        /* Контейнер интерактивной строки ввода и кнопки */
        .controls-row {
            width: 100%;
            display: flex;
            position: relative;
        }

        .input-container {
            flex: 1;
            position: relative;
        }

        .ios-input {
            width: 100%;
            height: 52px;
            background-color: var(--ios-dark-gray);
            border: 1px solid var(--ios-border-light);
            border-radius: 999px;
            color: white;
            font-size: 17px;
            font-weight: 400;
            text-align: center;
            outline: none;
            box-sizing: border-box;
            -webkit-appearance: none;
        }

        .ios-input::placeholder {
            color: var(--ios-hint);
            opacity: 0.6;
            text-align: center;
        }

        /* Быстрая мармеладность строки строго при тапе / фокусе */
        .ios-input:focus {
            animation: tap-jelly-fast 0.3s cubic-bezier(0.2, 1.2, 0.4, 1.4) forwards;
        }

        /* Появление круглой кнопки с легкой мармеладностью */
        .login-btn {
            width: 0;
            height: 52px;
            background-color: var(--ios-dark-gray);
            border: 1px solid var(--ios-border-light);
            border-radius: 999px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            opacity: 0;
            cursor: pointer;
            box-sizing: border-box;
            pointer-events: none;
            transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s ease, margin-left 0.4s ease;
        }

        .login-btn img {
            width: 22px;
            height: 22px;
            object-fit: contain;
            display: block;
        }

        .controls-row.valid .login-btn {
            width: 52px;
            opacity: 1;
            margin-left: 10px;
            pointer-events: auto;
            animation: button-bounce 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* Контейнер трех раздельных отрезков-счетчиков */
        .counters-grid {
            width: 100%;
            display: none; /* Включается скриптом */
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            animation: fade-in-up 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .counter-pill {
            height: 52px;
            background-color: var(--ios-dark-gray);
            border: 1px solid var(--ios-border-light);
            border-radius: 999px; /* Капсула */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }

        .counter-val {
            font-size: 16px;
            font-weight: 700;
            line-height: 1.1;
        }

        .counter-label {
            font-size: 10px;
            font-weight: 500;
            color: var(--ios-hint);
            margin-top: 1px;
        }

        /* Анимационные тайминги */
        @keyframes tap-jelly-fast {
            0% { transform: scale(1); }
            40% { transform: scaleX(1.05) scaleY(0.95); }
            100% { transform: scale(1); }
        }

        @keyframes button-bounce {
            0% { transform: scale(0.6); }
            70% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }

        @keyframes fade-in-up {
            0% { opacity: 0; transform: translateY(12px) scale(0.98); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
    </style>
</head>
<body>

    <div class="app-viewport" id="viewport" onclick="closeFolders(event)">
        <div class="center-wrapper" onclick="event.stopPropagation()">
            
            <div class="safe-area-container">
                <div class="folder-item f-left" data-label="Тексты">
                    <img src="folder.png" alt="Folder">
                    <div class="folder-badge">Тексты</div>
                </div>
                <div class="folder-item f-center" data-label="Фото">
                    <img src="folder.png" alt="Folder">
                    <div class="folder-badge">Фото</div>
                </div>
                <div class="folder-item f-right" data-label="Прочее">
                    <img src="folder.png" alt="Folder">
                    <div class="folder-badge">Прочее</div>
                </div>

                <img src="safe.png" alt="Safe Closed" class="safe-image" id="safeClosed" onclick="handleSafeClick()">
                <img src="safe2.png" alt="Safe Opened" class="safe-image hidden" id="safeOpened" onclick="handleSafeClick()">
            </div>
            
            <div class="title-frame">
                <h1 class="title" id="mainTitle">Добро пожаловать!</h1>
            </div>
            
            <p class="description" id="mainDesc">Придумай надежные пароль, который содержит минимум 8 символов, заглавную букву и цифру</p>
            
            <div class="controls-row" id="controlsRow">
                <div class="input-container">
                    <input type="password" class="ios-input" id="passInput" placeholder="ABC123" autocomplete="off" oninput="validatePassword(this)">
                </div>
                <div class="login-btn" id="loginBtn" onclick="triggerSystemAlert()">
                    <img src="login.png" alt="Login">
                </div>
            </div>

            <div class="counters-grid" id="countersGrid">
                <div class="counter-pill">
                    <div class="counter-val">0</div>
                    <div class="counter-label">Текстов</div>
                </div>
                <div class="counter-pill">
                    <div class="counter-val">0</div>
                    <div class="counter-label">Фото</div>
                </div>
                <div class="counter-pill">
                    <div class="counter-val">0</div>
                    <div class="counter-label">Прочего</div>
                </div>
            </div>

        </div>
    </div>

    <script>
        let isWorkspaceUnlocked = false;

        document.addEventListener('touchstart', e => { 
            if (e.touches.length > 1) e.preventDefault(); 
        }, { passive: false });

        function validatePassword(input) {
            const val = input.value;
            const hasMinLength = val.length >= 8;
            const hasUpper = /[A-Z]/.test(val) || /[А-Я]/.test(val);
            const hasNumber = /[0-9]/.test(val);
            
            const row = document.getElementById('controlsRow');
            if (hasMinLength && hasUpper && hasNumber) {
                row.classList.add('valid');
            } else {
                row.classList.remove('valid');
            }
        }

        function triggerSystemAlert() {
            const proceed = confirm("Продолжая, вы принимаете наши условия использования.");
            if (proceed) {
                executeTransition();
            }
        }

        function executeTransition() {
            const title = document.getElementById('mainTitle');
            const desc = document.getElementById('mainDesc');
            const controls = document.getElementById('controlsRow');
            const counters = document.getElementById('countersGrid');
            const frame = title.parentElement;

            title.style.transform = 'translateY(100%)';
            title.style.opacity = '0';
            desc.style.opacity = '0';

            // Плавно скрываем только кнопку авторизации, а инпут подменяем счетчиками
            controls.style.opacity = '0';
            controls.style.transform = 'scale(0.95)';
            controls.style.pointerEvents = 'none';

            setTimeout(() => {
                const newTitle = document.createElement('h1');
                newTitle.className = 'title incoming';
                newTitle.id = 'mainTitle';
                newTitle.innerText = 'Ваш сейф, имя';
                frame.appendChild(newTitle);

                setTimeout(() => {
                    newTitle.style.transform = 'translateY(0)';
                    newTitle.style.opacity = '1';
                }, 50);

                desc.innerText = 'Храните здесь тексты, фотографии и видео анонимно';
                desc.style.opacity = '1';

                // Прячем старую строку ввода и выводим 3 равных отрезка
                controls.remove();
                counters.style.display = 'grid';
                isWorkspaceUnlocked = true;

            }, 300);
        }

        // Клик по сейфу после авторизации
        function handleSafeClick() {
            if (!isWorkspaceUnlocked) return;

            const viewport = document.getElementById('viewport');
            const closedSafe = document.getElementById('safeClosed');
            const openedSafe = document.getElementById('safeOpened');

            if (!viewport.classList.contains('opened')) {
                // Анимация открытия сейфа
                closedSafe.classList.add('hidden');
                openedSafe.classList.remove('hidden');
                viewport.classList.add('opened');
            } else {
                // Закрытие сейфа
                viewport.classList.remove('opened');
                openedSafe.classList.add('hidden');
                closedSafe.classList.remove('hidden');
            }
        }

        // Закрытие папок при клике мимо сейфа
        function closeFolders(event) {
            const viewport = document.getElementById('viewport');
            if (viewport.classList.contains('opened')) {
                viewport.classList.remove('opened');
                document.getElementById('safeOpened').classList.add('hidden');
                document.getElementById('safeClosed').classList.remove('hidden');
            }
        }

        // Логика перетаскивания (Drag) с деформацией папок в сторону движения
        document.querySelectorAll('.folder-item').forEach(folder => {
            let isDragging = false;
            let startX, startY;
            const img = folder.querySelector('img');

            folder.addEventListener('mousedown', dragStart);
            folder.addEventListener('touchstart', dragStart, { passive: true });

            function dragStart(e) {
                if (!document.getElementById('viewport').classList.contains('opened')) return;
                isDragging = true;
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                startX = clientX;
                startY = clientY;

                document.addEventListener('mousemove', dragMove);
                document.addEventListener('touchmove', dragMove, { passive: false });
                document.addEventListener('mouseup', dragEnd);
                document.addEventListener('touchend', dragEnd);
            }

            function dragMove(e) {
                if (!isDragging) return;
                if (e.cancelable) e.preventDefault();

                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;

                const deltaX = clientX - startX;
                const deltaY = clientY - startY;

                // Ограничиваем натяжение физики деформации
                const skewX = Math.min(Math.max(deltaX * 0.15, -15), 15);
                const scaleX = 1 + Math.abs(deltaX) * 0.002;

                // Применяем трансляцию положения и желейное искажение картинки папки
                folder.style.zIndex = '100';
                img.style.transform = `translate(${deltaX}px, ${deltaY}px) skewX(${skewX}deg) scaleX(${scaleX})`;
            }

            function dragEnd() {
                if (!isDragging) return;
                isDragging = false;
                folder.style.zIndex = '15';
                
                // Плавный возврат картинки на законное нативное место
                img.style.transition = 'transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                img.style.transform = 'translate(0, 0) skewX(0deg) scaleX(1)';
                
                setTimeout(() => { img.style.transition = 'transform 0.1s linear'; }, 400);

                document.removeEventListener('mousemove', dragMove);
                document.removeEventListener('touchmove', dragMove);
                document.removeEventListener('mouseup', dragEnd);
                document.removeEventListener('touchend', dragEnd);
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sovereign Vault</title>
    <style>
        :root {
            --ios-bg: #000000;
            
            /* Нативный темно-серый цвет iOS (системный заполняющий цвет для темной темы) */
            --ios-dark-gray: #1C1C1E;
            /* Тонкая рамка чуть светлее основного фона */
            --ios-border-light: rgba(255, 255, 255, 0.06);
            --ios-hint: rgba(255, 255, 255, 0.45);
        }

        body, html {
            background-color: var(--ios-bg);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
            color: white;
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100%;
            overflow: hidden;
            position: fixed; 
            -webkit-font-smoothing: antialiased;
            touch-action: manipulation;
            box-sizing: border-box;
        }

        /* Центральный контейнер */
        .center-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            max-width: 320px; /* Фиксированная ширина текста и элементов */
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 0 16px;
            box-sizing: border-box;
        }

        /* Крупное изображение сейфа */
        .safe-image {
            width: 120px;
            height: 120px;
            object-fit: contain;
            margin-bottom: 28px;
            display: block;
            /* Мягкая тень, чтобы картинка не сливалась с черным фоном */
            filter: drop-shadow(0 8px 24px rgba(0, 0, 0, 0.5));
        }

        /* Жирный Apple-style заголовок */
        .title {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin: 0 0 12px 0;
            color: white;
        }

        /* Описание, строго выровненное по ширине */
        .description {
            font-size: 14px;
            font-weight: 400;
            line-height: 1.45;
            color: var(--ios-hint);
            margin: 0 0 36px 0;
        }

        /* Контейнер строки ввода */
        .input-container {
            width: 100%;
            position: relative;
        }

        /* Нативная темно-серая строка ввода iOS */
        .ios-input {
            width: 100%;
            height: 52px;
            background-color: var(--ios-dark-gray);
            border: 1px solid var(--ios-border-light);
            border-radius: 999px; /* Полностью круглые углы (Pill-shape) */
            color: white;
            font-size: 17px;
            font-weight: 400;
            text-align: center;
            outline: none;
            box-sizing: border-box;
            -webkit-appearance: none;
            
            /* Плавное возвращение в исходную форму */
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        /* Подсказка строго по центру */
        .ios-input::placeholder {
            color: var(--ios-hint);
            opacity: 0.6;
            text-align: center;
        }

        /* Эффект «Жидкой капли» при клике/фокусе */
        .ios-input:focus {
            background-color: #2C2C2E; /* Слегка светлеет при активном вводе */
            border-color: rgba(255, 255, 255, 0.12);
            /* Анимация упругого желеобразного толчка */
            animation: focus-bounce 0.45s cubic-bezier(0.25, 1.25, 0.5, 1.4) forwards;
        }

        /* Тайминги деформации жидкого стекла */
        @keyframes focus-bounce {
            0% {
                transform: scale(1);
            }
            30% {
                /* В момент нажатия слегка расплывается по горизонтали и сжимается */
                transform: scaleX(1.04) scaleY(0.94);
            }
            60% {
                /* Компенсационное вытягивание вверх */
                transform: scaleX(0.98) scaleY(1.02);
            }
            100% {
                /* Возврат в идеальную форму */
                transform: scale(1);
            }
        }
    </style>
</head>
<body>

    <div class="center-wrapper">
        <!-- Твоя картинка safe.png -->
        <img src="safe.png" alt="Safe" class="safe-image">
        
        <h1 class="title">Добро пожаловать!</h1>
        <p class="description">Придумай надежные пароль, который содержит минимум 8 символов, заглавную букву и цифру</p>
        
        <div class="input-container">
            <!-- Строка ввода с анимацией упругого клика -->
            <input type="password" class="ios-input" placeholder="ABC123" autocomplete="off">
        </div>
    </div>

    <script>
        // Глушим системный зум iOS при двойном тапе, сохраняя нативность
        document.addEventListener('touchstart', e => { 
            if (e.touches.length > 1) e.preventDefault(); 
        }, { passive: false });
    </script>
</body>
</html>

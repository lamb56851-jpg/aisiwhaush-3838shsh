<body>

    <div class="app-viewport" id="viewport" onclick="closeFolders(event)">
        <div class="center-wrapper" onclick="event.stopPropagation()">
            
            <div class="safe-area-container">
                <div class="folder-item f-left" onclick="openTab('Тексты')">
                    <img src="folder.png" alt="Folder">
                    <div class="folder-badge">Тексты</div>
                </div>
                <div class="folder-item f-center" onclick="openTab('Фото')">
                    <img src="folder.png" alt="Folder">
                    <div class="folder-badge">Фото</div>
                </div>
                <div class="folder-item f-right" onclick="openTab('Видео')">
                    <img src="folder.png" alt="Folder">
                    <div class="folder-badge">Видео</div>
                </div>

                <img src="safe.png" alt="Safe Closed" class="safe-image" id="safeClosed" onclick="handleSafeClick()">
                <img src="safe2.png" alt="Safe Opened" class="safe-image hidden" id="safeOpened" onclick="handleSafeClick()">
            </div>
            
            <div class="title-frame">
                <h1 class="title" id="mainTitle">Добро пожаловать!</h1>
            </div>
            
            <p class="description" id="mainDesc">Придумай надежные пароль, который содержит минимум 8 символов, заглавную букву и цифру</p>
            
            <div class="controls-row" id="controlsRow">
                <div class="input-container">
                    <input type="password" class="ios-input" id="passInput" placeholder="ABC123" autocomplete="off" oninput="validatePassword(this)">
                </div>
                <div class="login-btn" id="loginBtn" onclick="triggerSystemAlert()">
                    <img src="login.png" alt="Login">
                </div>
            </div>

            <div class="counters-grid" id="countersGrid">
                <div class="counter-pill">
                    <div class="counter-val">0</div>
                    <div class="counter-label">Текстов</div>
                </div>
                <div class="counter-pill">
                    <div class="counter-val">0</div>
                    <div class="counter-label">Фото</div>
                </div>
                <div class="counter-pill">
                    <div class="counter-val">0</div>
                    <div class="counter-label">Видео</div>
                </div>
            </div>

        </div>
    </div>

    <div class="folder-tab" id="folderTab">
        <div class="tab-header">
            <div class="fallback-back-btn" id="fallbackBack" onclick="closeActiveTab()">
                <svg viewBox="0 0 24 24">
                    <path d="M15 19l-7-7 7-7" />
                </svg>
            </div>
            <div class="tab-title" id="tabTitle">Раздел</div>
        </div>
        <div class="add-capsule-btn" onclick="triggerAddAction()">
            <img src="add.png" alt="Add">
            <span>Добавить</span>
        </div>
    </div>

    <script>
        let isWorkspaceUnlocked = false;
        let tg = window.Telegram ? window.Telegram.WebApp : null;

        if (tg) {
            tg.ready();
            tg.expand();
            if (tg.requestFullscreen) {
                tg.requestFullscreen();
            }
        }

        function triggerVibe() {
            if (tg && tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('light');
            }
        }

        function validatePassword(input) {
            const val = input.value;
            const hasMinLength = val.length >= 8;
            const hasUpper = /[A-Z]/.test(val) || /[А-Я]/.test(val);
            const hasNumber = /[0-9]/.test(val);
            
            const row = document.getElementById('controlsRow');
            if (hasMinLength && hasUpper && hasNumber) {
                row.classList.add('valid');
            } else {
                row.classList.remove('valid');
            }
        }

        function triggerSystemAlert() {
            const proceed = confirm("Продолжая, вы принимаете наши условия использования.");
            if (proceed) {
                executeTransition();
            }
        }

        function executeTransition() {
            const title = document.getElementById('mainTitle');
            const desc = document.getElementById('mainDesc');
            const controls = document.getElementById('controlsRow');
            const counters = document.getElementById('countersGrid');
            const frame = title.parentElement;

            title.style.transform = 'translateY(100%)';
            title.style.opacity = '0';
            desc.style.opacity = '0';

            controls.style.opacity = '0';
            controls.style.transform = 'scale(0.95)';
            controls.style.pointerEvents = 'none';

            setTimeout(() => {
                const newTitle = document.createElement('h1');
                newTitle.className = 'title incoming';
                newTitle.id = 'mainTitle';
                newTitle.innerText = 'Воркспейс';
                frame.appendChild(newTitle);

                setTimeout(() => {
                    newTitle.style.transform = 'translateY(0)';
                    newTitle.style.opacity = '1';
                }, 50);

                desc.innerText = 'Храните здесь тексты, фотографии и видео анонимно';
                desc.style.opacity = '1';

                controls.remove();
                counters.style.display = 'grid';
                isWorkspaceUnlocked = true;
            }, 300);
        }

        function handleSafeClick() {
            if (!isWorkspaceUnlocked) return;
            triggerVibe();

            const viewport = document.getElementById('viewport');
            const closedSafe = document.getElementById('safeClosed');
            const openedSafe = document.getElementById('safeOpened');

            if (!viewport.classList.contains('opened')) {
                closedSafe.classList.add('hidden');
                openedSafe.classList.remove('hidden');
                viewport.classList.add('opened');
            } else {
                viewport.classList.remove('opened');
                openedSafe.classList.add('hidden');
                closedSafe.classList.remove('hidden');
            }
        }

        function closeFolders(event) {
            const viewport = document.getElementById('viewport');
            if (viewport.classList.contains('opened')) {
                viewport.classList.remove('opened');
                document.getElementById('safeOpened').classList.add('hidden');
                document.getElementById('safeClosed').classList.remove('hidden');
            }
        }

        function openTab(type) {
            triggerVibe();
            document.getElementById('tabTitle').innerText = type;
            const tab = document.getElementById('folderTab');
            tab.classList.add('active');

            if (tg) {
                tg.BackButton.show();
                tg.BackButton.onClick(closeActiveTab);
                document.getElementById('fallbackBack').style.display = 'none';
            } else {
                document.getElementById('fallbackBack').style.display = 'flex';
            }
        }

        function closeActiveTab() {
            triggerVibe();
            const tab = document.getElementById('folderTab');
            tab.classList.remove('active');

            if (tg) {
                tg.BackButton.hide();
                tg.BackButton.offClick(closeActiveTab);
            }
        }

        function triggerAddAction() {
            triggerVibe();
        }

        document.querySelectorAll('.folder-item').forEach(folder => {
            let isDragging = false;
            let startX, startY;
            const img = folder.querySelector('img');

            folder.addEventListener('mousedown', dragStart);
            folder.addEventListener('touchstart', dragStart, { passive: true });

            function dragStart(e) {
                if (!document.getElementById('viewport').classList.contains('opened')) return;
                isDragging = true;
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                startX = clientX;
                startY = clientY;

                document.addEventListener('mousemove', dragMove);
                document.addEventListener('touchmove', dragMove, { passive: false });
                document.addEventListener('mouseup', dragEnd);
                document.addEventListener('touchend', dragEnd);
            }

            function dragMove(e) {
                if (!isDragging) return;
                if (e.cancelable) e.preventDefault();

                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;

                let deltaX = clientX - startX;
                let deltaY = clientY - startY;

                const maxDist = 18;
                const dist = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
                if (dist > maxDist) {
                    deltaX = (deltaX / dist) * maxDist;
                    deltaY = (deltaY / dist) * maxDist;
                }

                const skewX = deltaX * 0.4;
                const scaleX = 1 + Math.abs(deltaX) * 0.003;

                folder.style.zIndex = '100';
                img.style.transform = `translate(${deltaX}px, ${deltaY}px) skewX(${skewX}deg) scaleX(${scaleX})`;
            }

            function dragEnd() {
                if (!isDragging) return;
                isDragging = false;
                folder.style.zIndex = '15';
                
                img.style.transition = 'transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                img.style.transform = 'translate(0, 0) skewX(0deg) scaleX(1)';
                
                setTimeout(() => { img.style.transition = 'transform 0.15s cubic-bezier(0.2, 0.8, 0.2, 1)'; }, 300);

                document.removeEventListener('mousemove', dragMove);
                document.removeEventListener('touchmove', dragMove);
                document.removeEventListener('mouseup', dragEnd);
                document.removeEventListener('touchend', dragEnd);
            }
        });
    </script>
</body>
</html>
